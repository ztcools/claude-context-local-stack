# =============================================================================
# claude-context 一体化部署 —— 四大服务
#   1. Milvus 向量数据库:  etcd / minio / standalone
#   2. Ollama 向量化推理:   ollama (GPU, 模型 nomic-embed-text)
#   3. git-index 定时索引:  git-index (每日 pull/clone GitLab 仓库并增量索引 main)
#   4. PhiGent Web 控制台:  phigent (Milvus 管理 + 索引树 + GitLab 仓库管理)
#
# 自建镜像(phigent / git-index)由 deploy.sh 从 ./images/*.tar.gz 加载,
# 基础镜像(milvus/ollama 等)使用本机已有镜像,均不联网拉取。
# 变量见 .env.example。服务间用容器名互访(standalone:19530 / ollama:11434)。
# =============================================================================

services:
  etcd:
    container_name: ${PROJECT_PREFIX:-claude}-milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DATA_DIR:-./data}/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: ${PROJECT_PREFIX:-claude}-milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${DATA_DIR:-./data}/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: ${PROJECT_PREFIX:-claude}-milvus-standalone
    image: milvusdb/milvus:v2.6.18
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ${DATA_DIR:-./data}/milvus:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9091}:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  ollama:
    container_name: ${PROJECT_PREFIX:-claude}-ollama
    image: ollama/ollama:latest
    pull_policy: never
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    volumes:
      - ${OLLAMA_DATA:-./data/ollama}:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_LOAD_TIMEOUT: 10m
      OLLAMA_CONTEXT_LENGTH: 2048
      OLLAMA_FLASH_ATTENTION: "true"
      OLLAMA_NO_UPDATE_CHECK: "true"
      OLLAMA_NOPRUNE: "true"
      OLLAMA_GPU_MEMORY_FACTOR: "0.9"
      OLLAMA_PARALLEL_REQUESTS: ${OLLAMA_PARALLEL_REQUESTS:-32}
      OLLAMA_MAX_BATCH_SIZE: ${OLLAMA_MAX_BATCH_SIZE:-1024}
      OLLAMA_SCHED_SPREAD: "false"
      OLLAMA_NUM_GPUS: ${OLLAMA_NUM_GPUS:-1}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-8}
      OLLAMA_CPU_THREADS: ${OLLAMA_CPU_THREADS:-16}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_GPU_COUNT:-all}
              capabilities: [gpu]

  git-index:
    container_name: ${PROJECT_PREFIX:-claude}-git-index
    image: claude-context-git-index:latest
    pull_policy: never
    restart: unless-stopped
    user: "${GIT_INDEX_UID:-1015}:${GIT_INDEX_GID:-1015}"
    ports:
      - "${GIT_INDEX_PORT:-8795}:8790"
    volumes:
      - ${GIT_INDEX_DATA:-./data/git-index}:/workdir
    environment:
      HOME: /tmp
      EMBEDDING_PROVIDER: Ollama
      OLLAMA_HOST: http://ollama:11434
      EMBEDDING_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSION: ${EMBED_DIMENSION:-768}
      MILVUS_ADDRESS: standalone:19530
      EMBEDDING_CACHE_ENABLED: "true"
      GIT_INCREMENTAL_ENABLED: "true"
      GIT_LAYERED_ENABLED: "true"
      GIT_DELTA_MAX_FILES: "2000"
      GIT_SSL_NO_VERIFY: ${GIT_SSL_NO_VERIFY:-false}
      GIT_INDEX_SOURCE: config
      GIT_INDEX_WORKDIR: /workdir/repos
      GIT_INDEX_CONFIG_FILE: /workdir/git-index-config.json
      GIT_INDEX_RUN_ON_START: "false"
      GIT_INDEX_DAILY_HOUR: ${GIT_INDEX_DAILY_HOUR:-3}
      GIT_INDEX_HTTP_PORT: "8790"
    depends_on:
      standalone:
        condition: service_healthy

  phigent:
    container_name: ${PROJECT_PREFIX:-claude}-phigent
    image: claude-phigent:latest
    pull_policy: never
    restart: unless-stopped
    ports:
      - "${PHIGENT_PORT:-18000}:3000"
    environment:
      MILVUS_URL: ${MILVUS_URL:-standalone:19530}
      GIT_INDEX_PORT: ${GIT_INDEX_PORT:-8795}
    volumes:
      - ./assets/phigent-env.sh:/app/build/env.sh:ro
    depends_on:
      standalone:
        condition: service_healthy

networks:
  default:
    name: ${PROJECT_PREFIX:-claude}-net
